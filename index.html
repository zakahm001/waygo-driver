<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Waygo — Förarapp</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:Arial,sans-serif;background:#0d1b3e;color:white;min-height:100vh}
    .screen{display:none;min-height:100vh;flex-direction:column}
    .screen.active{display:flex}
    #sLoad{background:#0d1b3e;align-items:center;justify-content:center;gap:12px}
    .load-logo{font-size:64px;color:#fbbf24;animation:bounce 1s infinite}
    .load-name{color:#fbbf24;font-size:26px;font-weight:bold;letter-spacing:4px}
    .load-sub{color:#4a6090;font-size:13px}
    .dots{display:flex;gap:8px;margin-top:12px}
    .dot{width:10px;height:10px;background:#fbbf24;border-radius:50%;animation:dp 1.2s infinite}
    .dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
    @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
    @keyframes dp{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
    #sLogin{background:#0d1b3e;padding:30px 24px;align-items:center;justify-content:center}
    .login-wrap{width:100%;max-width:400px}
    .login-logo{text-align:center;margin-bottom:32px}
    .login-icon{font-size:52px;color:#fbbf24}
    .login-name{font-size:26px;font-weight:bold;color:#fbbf24;letter-spacing:3px;margin-top:6px}
    .login-sub{color:#4a6090;font-size:13px;margin-top:4px}
    .login-box{background:#1a2f5e;border-radius:16px;padding:24px;border:1px solid #2a4080}
    .flabel{font-size:11px;font-weight:700;color:#4a6090;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;display:block}
    .finput{width:100%;padding:12px 14px;border-radius:10px;border:1px solid #2a4080;background:#0d1b3e;color:white;font-size:15px;outline:none;box-sizing:border-box;margin-bottom:14px;transition:border-color .2s}
    .finput:focus{border-color:#fbbf24}
    .finput::placeholder{color:#2a4080}
    .err-box{background:#fee2e2;color:#dc2626;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:14px;display:none;font-weight:600}
    .topbar{background:#0d1b3e;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #1a2f5e;position:sticky;top:0;z-index:100}
    .tlogo{color:#fbbf24;font-size:18px;font-weight:bold}
    .tright{display:flex;align-items:center;gap:10px}
    .online-toggle{display:flex;align-items:center;gap:8px}
    .toggle-track{width:52px;height:28px;border-radius:14px;background:#2a4080;cursor:pointer;position:relative;transition:background .3s}
    .toggle-track.on{background:#15803d}
    .toggle-thumb{position:absolute;width:22px;height:22px;border-radius:50%;background:white;top:3px;left:3px;transition:left .3s;box-shadow:0 2px 4px rgba(0,0,0,.3)}
    .toggle-track.on .toggle-thumb{left:27px}
    .toggle-label{font-size:12px;font-weight:700;color:#4a6090}
    .bnav{position:fixed;bottom:0;left:0;right:0;background:#0d1b3e;display:flex;justify-content:space-around;padding:10px 0;border-top:1px solid #1a2f5e;z-index:100}
    .bni{display:flex;flex-direction:column;align-items:center;gap:3px;color:#4a6090;font-size:10px;cursor:pointer;border:none;background:none}
    .bni.active{color:#fbbf24}
    .page{padding:20px;flex:1;overflow-y:auto;background:#eef1f8;color:#0d1b3e}
    .stitle{font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px}
    .btn{padding:14px;border-radius:10px;font-size:15px;font-weight:700;border:none;cursor:pointer;width:100%;text-align:center;transition:all .2s;margin-bottom:10px}
    .btn-primary{background:#0d1b3e;color:#fbbf24}
    .btn-danger{background:#dc2626;color:white}
    .btn-yellow{background:#fbbf24;color:#0d1b3e}
    .booking-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:500;display:none;align-items:center;justify-content:center;padding:20px}
    .booking-overlay.show{display:flex}
    .booking-popup{background:white;border-radius:20px;padding:24px;width:100%;max-width:420px;color:#0d1b3e}
    .popup-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
    .popup-new{background:#dc2626;color:white;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700}
    .popup-timer{font-size:28px;font-weight:800;color:#dc2626}
    .popup-btns{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:20px}
    .popup-accept{background:#15803d;color:white;border:none;border-radius:12px;padding:16px;font-size:16px;font-weight:800}
    .popup-decline{background:#f1f5f9;color:#64748b;border:none;border-radius:12px;padding:16px;font-size:16px;font-weight:700}
    .driver-header{background:linear-gradient(135deg,#0d1b3e,#1a3066);padding:24px 20px;display:flex;align-items:center;gap:16px}
    .driver-avatar{width:60px;height:60px;border-radius:50%;background:#fbbf24;color:#0d1b3e;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:bold}
    .status-pill{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700}
    .pill-online{background:#dcfce7;color:#15803d}
    .pill-offline{background:#1a2f5e;color:#4a6090}
    .toast{position:fixed;bottom:90px;left:20px;right:20px;background:#fbbf24;color:#0d1b3e;padding:14px 20px;border-radius:12px;font-size:14px;font-weight:bold;text-align:center;z-index:300;display:none}
    .toast.show{display:block}
  </style>
</head>
<body>

<div class="screen active" id="sLoad">
  <div class="load-logo">▲</div>
  <div class="load-name">WAYGO</div>
  <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
</div>

<div class="screen" id="sLogin">
  <div class="login-wrap">
    <div class="login-logo">
      <div class="login-icon">▲</div>
      <div class="login-name">WAYGO</div>
    </div>
    <div class="login-box">
      <label class="flabel">E-post / Email</label>
      <input class="finput" id="loginEmail" type="email" placeholder="din@email.se">
      <label class="flabel">Lösenord / Password</label>
      <input class="finput" id="loginPassword" type="password" placeholder="••••••••">
      <div class="err-box" id="loginErr"></div>
      <button class="btn btn-yellow" id="loginBtn" onclick="doLogin()">Logga in →</button>
    </div>
  </div>
</div>

<div class="screen" id="sApp">
  <div class="topbar">
    <div class="tlogo">▲ WAYGO</div>
    <div class="tright">
      <div class="online-toggle" onclick="toggleOnline()">
        <div class="toggle-track" id="toggleTrack"><div class="toggle-thumb"></div></div>
        <span class="toggle-label" id="toggleLabel">Offline</span>
      </div>
    </div>
  </div>
  <div style="flex:1;overflow-y:auto;background:#eef1f8" id="tabContent"></div>
  <div class="bnav">
    <button class="bni active" onclick="showTab(0)">🏠<span>Hem</span></button>
    <button class="bni" onclick="showTab(1)">📋<span>Resor</span></button>
    <button class="bni" onclick="showTab(3)">👤<span>Profil</span></button>
  </div>
</div>

<div class="booking-overlay" id="bookingOverlay">
  <div class="booking-popup">
    <div class="popup-header">
      <div class="popup-new">🚨 NY BOKNING!</div>
      <div class="popup-timer" id="popupTimer">30</div>
    </div>
    <div id="popupRoute" style="font-weight:bold; margin-bottom:10px;"></div>
    <div id="popupFare" style="font-size:24px; font-weight:bold; margin-bottom:20px;"></div>
    <div class="popup-btns">
      <button class="popup-decline" onclick="declineBooking()">✕ Neka</button>
      <button class="popup-accept" onclick="acceptBooking()">✓ Acceptera</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://16.16.153.106.sslip.io';
let driver = null, isOnline = false, activeBooking = null, socket = null, currentTab = 0;

// FIX 1: Initialize audio on interaction
document.addEventListener('touchstart', () => { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }, { once: false });
document.addEventListener('click', () => { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }, { once: false });

function playAlertSound() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();

    const playBeep = (freq, start, duration, volume) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(volume || 0.8, audioCtx.currentTime + start);
