<head>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>

  </style>
</head>
<body>

<div class="screen active" id="sLoad">
  <div class="load-logo">▲</div>
  <div class="load-name">WAYGO</div>
  <div class="load-sub">Förarapp · Driver App</div>
  <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
</div>

<div class="screen" id="sLogin">
  <div class="login-wrap">
    <div class="login-logo">
      <div class="login-icon">▲</div>

    </div>

<div class="screen" id="sApp">

  <div class="topbar">

    <div class="tright">

    <button class="bni" id="bni3" onclick="showTab(3)"><span class="bni-icon">👤</span><span>Profil</span></button>
  </div>
</div>

<div class="booking-overlay" id="bookingOverlay">
  <div class="booking-popup">
    <div class="popup-header">
      <div><div class="popup-new">🚨 NY BOKNING!</div><div style="font-size:12px;color:#64748b;margin-top:4px" id="popupRef"></div></div>
      <div class="popup-timer" id="popupTimer">30</div>
    </div>
    <div id="popupPreBadge" style="margin-bottom:8px;display:none"><span class="badge b-purple">📅 Förbokning</span><span style="font-size:12px;color:#7c3aed;margin-left:6px" id="popupPreTime"></span></div>
    <div class="popup-route" id="popupRoute"></div>
    <div class="popup-detail" id="popupDetail"></div>
    <div class="popup-fare" id="popupFare"></div>
    <div class="infobox ib-blue" id="popupPayment"></div>
    <div class="popup-btns">
      <button class="popup-decline" onclick="declineBooking()">✕ Neka</button>
      <button class="popup-accept" onclick="acceptBooking()">✓ Acceptera</button>

</div>

<div class="moverlay" id="chatModal" onclick="closeMIfOut(event,'chatModal')">
  <div class="mbox">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div class="mtitle" id="chatModalTitle" style="margin-bottom:0">Chatt</div>
      <button onclick="closeMod('chatModal')" style="background:none;border:none;font-size:22px;cursor:pointer;color:#64748b">✕</button>
    </div>

      <input class="cinput" id="chatModalInput" placeholder="Skriv meddelande..." onkeydown="if(event.key==='Enter')sendChatModal()"/>
      <button class="csend" onclick="sendChatModal()">➤</button>

<div class="toast" id="toast"></div>

<script>
const API = 'https://16.16.153.106.sslip.io';

// ── STATE ──
let driver = null;
let token = null;
let isOnline = false;
let activeBooking = null;
let myTrips = [];
let currentTab = 0;
let socket = null;
let gpsInterval = null;
let currentLat = 59.3293;
let currentLng = 18.0686;
let popupTimerInterval = null;
let pendingBooking = null;
let chatThreadKey = null;

// Demo drivers
const DEMO_DRIVERS = [
  { id:1, name:'Erik Lindström',  email:'erik@waygo.se',  password:'driver123', plate:'ABC 123', taxiNr:'TL-4421', city:'Stockholm', rating:4.9, trips_today:0, earnings_today:0 },
  { id:2, name:'Amina Warsame',   email:'amina@waygo.se', password:'driver123', plate:'DEF 456', taxiNr:'TL-2209', city:'Göteborg',  rating:4.8, trips_today:0, earnings_today:0 },
  { id:3, name:'Lars Petersson',  email:'lars@waygo.se',  password:'driver123', plate:'GHI 789', taxiNr:'TL-8834', city:'Malmö',     rating:4.7, trips_today:0, earnings_today:0 },
];

// ── INIT ──
window.addEventListener('load', () => {
  setTimeout(() => {
    const saved = localStorage.getItem('waygo_driver');
    const savedToken = localStorage.getItem('waygo_driver_token');
    if (saved && savedToken) {
      driver = JSON.parse(saved);
      token = savedToken;
      enterApp();
    } else {
      showScreen('sLogin');
    }
  }, 2000);
});

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showToast(msg, color) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = color || '#fbbf24';
  t.style.color = color ? 'white' : '#0d1b3e';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}

function closeMod(id) { document.getElementById(id).classList.remove('open'); }
function closeMIfOut(e, id) { if (e.target === document.getElementById(id)) closeMod(id); }

// ── LOGIN ──
async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim().toLowerCase();
  const password = document.getElementById('loginPassword').value.trim();
  const errEl = document.getElementById('loginErr');
  const btn = document.getElementById('loginBtn');
  errEl.style.display = 'none';

  if (!email || !password) {
    errEl.textContent = '⚠️ Fyll i e-post och lösenord';
    errEl.style.display = ''; return;
  }

  btn.textContent = 'Loggar in...'; btn.disabled = true;

  const demoMatch = DEMO_DRIVERS.find(d => d.email === email && d.password === password);
  if (demoMatch) {
    driver = { ...demoMatch };
    token = 'driver-token-' + demoMatch.id;
    localStorage.setItem('waygo_driver', JSON.stringify(driver));
    localStorage.setItem('waygo_driver_token', token);
    enterApp();
    return;
  }

  errEl.textContent = '⚠️ Fel e-post eller lösenord';
  errEl.style.display = '';
  btn.textContent = 'Logga in som förare →'; btn.disabled = false;
}

function enterApp() {
  showScreen('sApp');
  showTab(0);
  connectSocket();
  startGPS();
  checkNotifPermission();
}

// ── NOTIFICATIONS & ALERTS ──
function checkNotifPermission() {
  if ('Notification' in window && Notification.permission === 'default') {
    document.getElementById('notifBanner').style.display = 'flex';
  }
}

function requestNotifPermission() {
  if ('Notification' in window) {
    Notification.requestPermission().then(perm => {
      document.getElementById('notifBanner').style.display = 'none';
      if (perm === 'granted') showToast('✅ Notiser aktiverade!');
    });
  }
}

function sendPushNotification(title, body) {
  if ('Notification' in window && Notification.permission === 'granted') {
    new Notification(title, { body, icon: 'https://zakahm001.github.io/waygo-driver/icon.png' });
  }
}

function playAlertSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const playBeep = (freq, start, duration) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.8, ctx.currentTime + start);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + start + duration);
      osc.start(ctx.currentTime + start); osc.stop(ctx.currentTime + start + duration);
    };
    playBeep(440, 0, 0.3); playBeep(550, 0.35, 0.3); playBeep(660, 0.7, 0.5);
  } catch(e) {}
}

function triggerBookingAlert(booking) {
  playAlertSound();
  if ('vibrate' in navigator) navigator.vibrate([500, 200, 500]);
  sendPushNotification('🚨 Ny bokning!', `${booking.from_address} → ${booking.to_address}`);
  showBookingPopup(booking);
}

// ── SOCKET.IO (UPDATED FIX 2 & 3) ──
function connectSocket() {
  try {
    socket = io(API);

    socket.on('connect', () => {
      console.log('Driver socket connected');
      // FIX 3: Use parseInt to ensure the ID is a number for room joining
      socket.emit('driver:join', parseInt(driver.id));
      
      // If we were online, re-sync status
      if (isOnline) {
        socket.emit('driver:status', {
          driverId: parseInt(driver.id),
          status: 'available'
        });
      }
    });

    socket.on('booking:new', (booking) => {
      if (!isOnline || activeBooking) return;
      triggerBookingAlert(booking);
    });

    // FIX 2: Listen for specific assignment to THIS driver
    socket.on('booking:assigned:driver', (booking) => {
      if (activeBooking) return;
      triggerBookingAlert(booking);
    });

    // FIX 2: Also listen for the general assignment event
    socket.on('booking:assigned', (booking) => {
      if (!isOnline || activeBooking) return;
      // Double check if this assignment belongs to us
      if (parseInt(booking.driver_id) === parseInt(driver.id)) {
        triggerBookingAlert(booking);
      }
    });

    socket.on('message:new:central-driver-' + driver.id, (msg) => {
      showToast('💬 Central: ' + msg.content, '#7c3aed');
      if (currentTab === 2) showTab(2);
    });

    socket.on('booking:cancelled', (data) => {
      if (activeBooking && activeBooking.id === data.id) {
        activeBooking = null;
        showToast('⚠️ Bokning avbokad', '#dc2626');
        showTab(0);
      }
    });

  } catch(e) { console.log('Socket error:', e); }
}

// ── ACTIONS ──
function toggleOnline() {
  isOnline = !isOnline;
  const track = document.getElementById('toggleTrack');
  const label = document.getElementById('toggleLabel');
  
  if (isOnline) {
    track.classList.add('on');
    label.textContent = 'Online';
    showToast('✅ Du är nu online');
    socket.emit('driver:join', parseInt(driver.id));
    socket.emit('driver:status', { driverId: parseInt(driver.id), status: 'available' });
  } else {
    track.classList.remove('on');
    label.textContent = 'Offline';
    showToast('⭕ Du är nu offline');
    socket.emit('driver:status', { driverId: parseInt(driver.id), status: 'offline' });
  }
  showTab(currentTab);
}

function startGPS() {
  gpsInterval = setInterval(() => {
    if (isOnline && socket) {
      currentLat += (Math.random() - 0.5) * 0.001;
      currentLng += (Math.random() - 0.5) * 0.001;
      socket.emit('driver:location', { driverId: parseInt(driver.id), lat: currentLat, lng: currentLng });
      updateMapMarker();
    }
  }, 5000);
}

function updateMapMarker() {
  const marker = document.getElementById('myMarker');
  if (!marker) return;
  marker.style.left = '50%'; marker.style.top = '50%';
}

function showBookingPopup(booking) {
  pendingBooking = booking;
  let countdown = 30;
  document.getElementById('popupRef').textContent = booking.booking_ref;
  document.getElementById('popupRoute').textContent = `📍 ${booking.from_address} → 🏁 ${booking.to_address}`;
  document.getElementById('popupDetail').textContent = `Kund: ${booking.customer_name}`;
  document.getElementById('popupFare').textContent = booking.fare_sek + ' kr';
  document.getElementById('popupPayment').textContent = `Betalning: ${booking.payment_method}`;
  document.getElementById('bookingOverlay').classList.add('show');
  
  if (popupTimerInterval) clearInterval(popupTimerInterval);
  popupTimerInterval = setInterval(() => {
    countdown--;
    document.getElementById('popupTimer').textContent = countdown;
    if (countdown <= 0) declineBooking();
  }, 1000);
}

async function acceptBooking() {
  if (!pendingBooking) return;
  clearInterval(popupTimerInterval);
  document.getElementById('bookingOverlay').classList.remove('show');
  try {
    const res = await fetch(`${API}/bookings/${pendingBooking.id}/assign`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ driver_id: parseInt(driver.id) })
    });
    if (res.ok) {
      activeBooking = pendingBooking;
      pendingBooking = null;
      driver.trips_today++;
      localStorage.setItem('waygo_driver', JSON.stringify(driver));
      showTab(1);
    }
  } catch(e) { showToast('⚠️ Fel vid accept', '#dc2626'); }
}

function declineBooking() {
  clearInterval(popupTimerInterval);
  document.getElementById('bookingOverlay').classList.remove('show');
  pendingBooking = null;
}

async function completeTrip() {
  if (!activeBooking) return;
  try {
    await fetch(`${API}/bookings/${activeBooking.id}/cancel`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: 'completed' })
    });
    driver.earnings_today += activeBooking.fare_sek;
    myTrips.unshift({...activeBooking});
    activeBooking = null;
    localStorage.setItem('waygo_driver', JSON.stringify(driver));
    socket.emit('driver:status', { driverId: parseInt(driver.id), status: 'available' });
    showTab(0);
  } catch(e) { showToast('⚠️ Fel vid slutförande'); }
}

// ── TABS & RENDER ──
function showTab(i) {
  currentTab = i;
  document.querySelectorAll('.bni').forEach((b, j) => b.classList.toggle('active', i === j));
  const content = document.getElementById('tabContent');
  if (i === 0) content.innerHTML = renderHomeTab();
  else if (i === 1) content.innerHTML = renderTripsTab();
  else if (i === 2) content.innerHTML = renderChatTab();
  else if (i === 3) content.innerHTML = renderProfileTab();
}

function renderHomeTab() {
  return `
    <div style="background:#0d1b3e;padding:20px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <div>
          <div style="color:#fbbf24;font-size:16px;font-weight:bold">${driver.name}</div>
          <div style="color:#4a6090;font-size:12px">${driver.plate}</div>
        </div>
        <span class="status-pill ${isOnline?(activeBooking?'pill-busy':'pill-online'):'pill-offline'}">
          ${isOnline?(activeBooking?'Upptagen':'Ledig'):'Offline'}
        </span>
      </div>
      <div class="earn-grid">
        <div class="earn-card"><div class="earn-val">${driver.earnings_today}</div><div class="earn-lbl">SEK</div></div>
        <div class="earn-card"><div class="earn-val">${driver.trips_today}</div><div class="earn-lbl">RESOR</div></div>
        <div class="earn-card"><div class="earn-val">${driver.rating}</div><div class="earn-lbl">BETYG</div></div>
      </div>
    </div>
    <div style="padding:20px">
      <div class="driver-map"><div class="map-bg"></div><div class="my-marker" id="myMarker">🚖</div></div>
      ${activeBooking ? `
        <div class="trip-card trip-active">
          <div class="trip-route">📍 ${activeBooking.from_address}</div>
          <div class="trip-route">🏁 ${activeBooking.to_address}</div>
          <button class="btn btn-success" style="margin-top:10px" onclick="completeTrip()">Slutför Resa</button>
        </div>
      ` : '<div class="infobox ib-blue">Väntar på nya uppdrag...</div>'}
    </div>`;
}

function renderTripsTab() { return `<div style="padding:20px"><div class="stitle">Historik</div>${myTrips.map(t=>`<div class="card">${t.booking_ref}: ${t.fare_sek} kr</div>`).join('')}</div>`; }
function renderChatTab() { return `<div style="padding:20px"><div class="stitle">Chatt</div><div class="card" onclick="openChat('central-driver-'+driver.id,'central','Central')">📡 Kontakta Centralen</div></div>`; }
function renderProfileTab() { return `<div style="padding:20px"><div class="card">${driver.name}<br>${driver.email}</div><button class="btn btn-danger" onclick="logout()">Logga ut</button></div>`; }

function openChat(key, role, name) { /* Simplified chat logic */ showToast('Chatt öppnas...'); }
function logout() { localStorage.clear(); location.reload(); }
</script>
</body>
