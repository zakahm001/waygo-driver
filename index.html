<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:Arial,sans-serif;background:#0d1b3e;color:white;min-height:100vh}
    .screen{display:none;min-height:100vh;flex-direction:column}
    .screen.active{display:flex}

    #sLoad{background:#0d1b3e;align-items:center;justify-content:center;gap:12px}
    .load-logo{font-size:64px;color:#fbbf24;animation:bounce 1s infinite}
    .load-name{color:#fbbf24;font-size:26px;font-weight:bold;letter-spacing:4px}
    .load-sub{color:#4a6090;font-size:13px}
    .dots{display:flex;gap:8px;margin-top:12px}
    .dot{width:10px;height:10px;background:#fbbf24;border-radius:50%;animation:dp 1.2s infinite}
    .dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
    @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

    .login-logo{text-align:center;margin-bottom:32px}
    .login-icon{font-size:52px;color:#fbbf24}
    .login-name{font-size:26px;font-weight:bold;color:#fbbf24;letter-spacing:3px;margin-top:6px}
    .login-sub{color:#4a6090;font-size:13px;margin-top:4px}

    .flabel{font-size:11px;font-weight:700;color:#4a6090;text-transform:uppercase;

    .finput{width:100%;padding:12px 14px;border-radius:10px;border:1px solid #2a4080;

    .finput:focus{border-color:#fbbf24}
    .finput::placeholder{color:#2a4080}
    .err-box{background:#fee2e2;color:#dc2626;border-radius:8px;padding:10px 14px;
      font-size:13px;margin-bottom:14px;display:none;font-weight:600}

    .topbar{background:#0d1b3e;padding:14px 20px;display:flex;align-items:center;

      position:sticky;top:0;z-index:100}
    .tlogo{color:#fbbf24;font-size:18px;font-weight:bold}

    .toggle-track{width:52px;height:28px;border-radius:14px;

    .pill-offline{background:#1a2f5e;color:#4a6090}

    .btn-primary{background:#0d1b3e;color:#fbbf24}
    .btn-success{background:#15803d;color:white}

<script>

// ── AUDIO INIT ON FIRST TOUCH ──
function initAudio() {
  if (!audioCtx) {
    try {
      audioCtx = new (window.AudioContext ||
        window.webkitAudioContext)();
    } catch(e) {}
  }
}
document.addEventListener('touchstart', initAudio);
document.addEventListener('click', initAudio);

// ── PLAY ALERT SOUND ──
function playAlertSound() {
  try {
    initAudio();
    if (!audioCtx) return;

    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }

    const beep = (freq, start, dur, vol) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.value = freq;
      osc.type = 'sine';
      gain.gain.setValueAtTime(
        vol || 1.0, audioCtx.currentTime + start);
      gain.gain.exponentialRampToValueAtTime(
        0.001, audioCtx.currentTime + start + dur);
      osc.start(audioCtx.currentTime + start);
      osc.stop(audioCtx.currentTime + start + dur);
    };

    // Urgent ascending alert
    beep(880, 0.00, 0.15, 1.0);
    beep(660, 0.20, 0.15, 1.0);
    beep(880, 0.40, 0.15, 1.0);
    beep(660, 0.60, 0.15, 1.0);
    beep(880, 0.80, 0.40, 1.0);
    beep(1100, 1.30, 0.15, 1.0);
    beep(880,  1.50, 0.15, 1.0);
    beep(1100, 1.70, 0.15, 1.0);
    beep(880,  1.90, 0.15, 1.0);
    beep(1100, 2.10, 0.60, 1.0);

  } catch(e) {
    console.log('Sound error:', e.message);
  }
}

// ── VIBRATE ──
function vibrateAlert() {
  try {
    if ('vibrate' in navigator) {
      navigator.vibrate(
        [800,200,400,200,800,200,400,200,800]);
    }
  } catch(e) {}
}

// ── PUSH NOTIFICATION ──
function sendPushNotification(title, body) {
  try {
    if ('Notification' in window &&
        Notification.permission === 'granted') {
      new Notification(title, {
        body: body,
        tag: 'waygo-booking',
        requireInteraction: true
      });
    }
  } catch(e) {}
}

// ── FULL ALERT ──
function triggerBookingAlert(booking) {
  playAlertSound();
  vibrateAlert();
  sendPushNotification(
    '🚨 Ny bokning! ' + booking.booking_ref,
    '📍 ' + booking.from_address +
    ' → ' + booking.to_address +
    ' · ' + booking.fare_sek + ' kr'
  );
  showBookingPopup(booking);
}

// ── NOTIFICATIONS ──
function checkNotifPermission() {
  if ('Notification' in window &&
      Notification.permission === 'default') {
    document.getElementById('notifBanner')
      .style.display = 'flex';
  }

function requestNotifPermission() {

// ── LOGIN ──
function doLogin() {
  const email = document.getElementById('loginEmail')
    .value.trim().toLowerCase();
  const password = document.getElementById('loginPassword')
    .value.trim();
  const errEl = document.getElementById('loginErr');
  const btn = document.getElementById('loginBtn');

  errEl.style.display = 'none';

  if (!email || !password) {
    errEl.textContent = '⚠️ Fyll i e-post och lösenord';
    errEl.style.display = '';
    return;
  }

  btn.textContent = 'Loggar in...';
  btn.disabled = true;

  const found = DEMO_DRIVERS.find(d =>
    d.email.trim().toLowerCase() === email &&
    d.password === password
  );

  if (found) {
    driver = { ...found };
    token = 'driver-token-' + found.id;
    localStorage.setItem(
      'waygo_driver', JSON.stringify(driver));
    localStorage.setItem(
      'waygo_driver_token', token);
    enterApp();
    return;
  }

  errEl.textContent =
    '⚠️ Fel e-post eller lösenord. ' +
    'Prova: erik@waygo.se / driver123';
  errEl.style.display = '';
  btn.textContent = 'Logga in som förare →';
  btn.disabled = false;
}

// ── GPS ──
function startGPS() {
  if ('geolocation' in navigator) {
    navigator.geolocation.watchPosition(
      pos => {
        currentLat = pos.coords.latitude;
        currentLng = pos.coords.longitude;
        sendGPS();
      },
      err => console.log('GPS:', err.message),
      { enableHighAccuracy: true,
        maximumAge: 5000, timeout: 10000 }
    );
  }

  gpsInterval = setInterval(() => {
    currentLat += (Math.random() - 0.5) * 0.001;
    currentLng += (Math.random() - 0.5) * 0.001;
    if (isOnline) sendGPS();
    updateMapMarker();
  }, 5000);
}

function sendGPS() {
  if (socket && isOnline) {
    socket.emit('driver:location', {
      driverId: parseInt(driver.id),
      lat: currentLat,
      lng: currentLng
    });
  }
}

function updateMapMarker() {
  const marker = document.getElementById('myMarker');
  if (!marker) return;
  const minLat=59.2, maxLat=59.5;
  const minLng=17.8, maxLng=18.2;
  const x = ((currentLng-minLng)/(maxLng-minLng))*80+10;
  const y = ((maxLat-currentLat)/(maxLat-minLat))*80+10;
  marker.style.left =
    Math.min(90,Math.max(10,x)) + '%';
  marker.style.top =
    Math.min(90,Math.max(10,y)) + '%';
}

// ── SOCKET ──
function connectSocket() {
  try {
    socket = io(API);

    socket.on('connect', () => {
      console.log('Socket connected');
      socket.emit('driver:join',
        parseInt(driver.id));
    });

    // New booking from customer
    socket.on('booking:new', (booking) => {
      if (!isOnline || activeBooking) return;
      triggerBookingAlert(booking);
    });

    // Central assigned THIS driver
    socket.on('booking:assigned:driver',
      (booking) => {
      if (activeBooking) return;
      triggerBookingAlert(booking);
    });

    // General assignment — check if it's for us
    socket.on('booking:assigned', (booking) => {
      if (!isOnline || activeBooking) return;
      if (parseInt(booking.driver_id) ===
          parseInt(driver.id)) {
        // Already accepted — update active booking
        activeBooking = booking;
        showTab(currentTab);
      }
    });

    // Booking cancelled
    socket.on('booking:cancelled', (data) => {
      if (activeBooking &&
          activeBooking.id === data.id) {
        activeBooking = null;
        showToast(
          '⚠️ Bokning avbokad av central',
          '#dc2626', 'white');
        showTab(0);
      }
    });

    // Message from central
    socket.on(
      'message:new:central-driver-' + driver.id,
      (msg) => {
        showToast(
          '💬 Central: ' + msg.content,
          '#7c3aed', 'white');
      }
    );

    socket.on('disconnect', () => {
      console.log('Socket disconnected');
    });

  } catch(e) {
    console.log('Socket error:', e);
  }
}

// ── BOOKING POPUP ──
function showBookingPopup(booking) {
  pendingBooking = booking;
  let countdown = 30;

  document.getElementById('popupRef')
    .textContent = booking.booking_ref;
  document.getElementById('popupRoute')
    .textContent =
      '📍 ' + booking.from_address +
      ' → 🏁 ' + booking.to_address;
  document.getElementById('popupDetail')
    .textContent =
      '👤 ' + booking.customer_name +
      ' · ' + (booking.customer_phone || '');
  document.getElementById('popupFare')
    .textContent = booking.fare_sek + ' kr';

  const pm = {
    swish: '📱 Swish',
    card: '💳 Kort',
    invoice: '📄 Faktura'
  };
  document.getElementById('popupPayment')
    .textContent = 'Betalning: ' +
      (pm[booking.payment_method] ||
       booking.payment_method);

  const preBadge =
    document.getElementById('popupPreBadge');
  if (booking.booking_type === 'pre' &&
      booking.scheduled_at) {
    preBadge.style.display = '';
    document.getElementById('popupPreTime')
      .textContent = new Date(booking.scheduled_at)
        .toLocaleString('sv-SE',
          { dateStyle:'medium', timeStyle:'short' });
  } else {
    preBadge.style.display = 'none';
  }

  document.getElementById('popupTimer')
    .textContent = countdown;
  document.getElementById('bookingOverlay')
    .classList.add('show');

  if (popupTimerInterval)
    clearInterval(popupTimerInterval);

  popupTimerInterval = setInterval(() => {
    countdown--;
    const el =
      document.getElementById('popupTimer');
    if (el) el.textContent = countdown;
    if (countdown <= 0) {
      clearInterval(popupTimerInterval);
      declineBooking();
    }
  }, 1000);
}

async function acceptBooking() {
  if (!pendingBooking) return;
  clearInterval(popupTimerInterval);
  document.getElementById('bookingOverlay')
    .classList.remove('show');

  try {
    const res = await fetch(
      API + '/bookings/' +
      pendingBooking.id + '/assign', {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        driver_id: parseInt(driver.id)
      })
    });

    if (res.ok) {
      activeBooking = { ...pendingBooking };
      pendingBooking = null;
      driver.trips_today =
        (driver.trips_today || 0) + 1;
      localStorage.setItem(
        'waygo_driver', JSON.stringify(driver));
      showToast(
        '✅ Bokning accepterad! Navigera till kunden.',
        '#15803d', 'white');
      showTab(1);
    } else {
      showToast('⚠️ Kunde inte acceptera',
        '#dc2626', 'white');
    }
  } catch(err) {
    showToast('⚠️ Nätverksfel',
      '#dc2626', 'white');
  }
}

function declineBooking() {
  clearInterval(popupTimerInterval);
  document.getElementById('bookingOverlay')
    .classList.remove('show');
  pendingBooking = null;
}

// ── COMPLETE TRIP ──
async function completeTrip() {
  if (!activeBooking) return;
  const fare = activeBooking.fare_sek || 0;
  myTrips.unshift({
    ...activeBooking,
    status: 'completed',
    completed_at: new Date()
  });
  driver.earnings_today =
    (driver.earnings_today || 0) + fare;
  localStorage.setItem(
    'waygo_driver', JSON.stringify(driver));

  try {
    await fetch(
      API + '/bookings/' +
      activeBooking.id + '/cancel',
      { method: 'PATCH' }
    );
  } catch(e) {}

  if (socket) {
    socket.emit('driver:status', {
      driverId: parseInt(driver.id),
      status: 'available'
    });
  }

  activeBooking = null;
  showToast(
    '✅ Resa slutförd! ' + fare + ' kr · Bra jobbat!',
    '#15803d', 'white');
  showTab(0);
}

          <span style="font-size:14px;color:#0d1b3e">
            🔊 Bokningsljud
          </span>
          <span class="badge b-green">✅ Aktivt</span>
        </div>
        <div class="list-item">
          <span style="font-size:14px;color:#0d1b3e">
            📳 Vibration
          </span>
          <span class="badge b-green">✅ Aktivt</span>
        </div>
        <div class="list-item">
          <span style="font-size:14px;color:#0d1b3e">
            🔔 Push-notiser
          </span>
          <span class="badge ${notifOk?'b-green':'b-yellow'}">
            ${notifOk ? '✅ Aktiverat' : '⚠️ Ej aktiverat'}
          </span>
        </div>
        ${!notifOk ? `
        <button class="btn btn-primary"
                style="margin-top:12px"
                onclick="requestNotifPermission()">
          Aktivera push-notiser
        </button>` : ''}
      </div>

      <div class="card">
        <div class="stitle">Konto</div>
        <div class="list-item">
          <span style="font-size:14px;color:#0d1b3e">Version</span>
          <span style="font-size:13px;color:#64748b">v2.0</span>
        </div>
      </div>

      <button class="btn btn-danger" onclick="logout()">
        Logga ut
      </button>

      <div class="bspace"></div>
    </div>`;
}

// ── CHAT ──
function openChat(threadKey, personName) {
  currentChatKey = threadKey;
  document.getElementById('chatModalTitle')
    .textContent = '💬 ' + personName;
  document.getElementById('chatModalMessages')
    .innerHTML =
      '<div style="text-align:center;color:#94a3b8;' +
      'font-size:12px;padding:20px">Laddar...</div>';
  document.getElementById('chatModal')
    .classList.add('open');
  loadChatMessages(threadKey);
}

async function loadChatMessages(threadKey) {
  try {
    const res = await fetch(
      API + '/messages/' + threadKey);
    const data = await res.json();
    const msgs = data.messages || [];
    const chatEl =
      document.getElementById('chatModalMessages');

    if (msgs.length === 0) {
      chatEl.innerHTML =
        '<div style="text-align:center;color:#94a3b8;' +
        'font-size:12px;padding:20px">' +
        'Inga meddelanden ännu</div>';
      return;
    }

    chatEl.innerHTML = msgs.map(m => {
      const mine = m.sender_role === 'driver';
      return `
        <div class="cmsg ${mine?'mine':'other'}">
          <div class="cav ${mine?'':'other'}">
            ${m.sender_name?.charAt(0)||'?'}
          </div>
          <div style="max-width:72%">
            <div style="font-size:10px;color:#94a3b8;
                 margin-bottom:2px;
                 text-align:${mine?'right':'left'}">
              ${m.sender_name}
            </div>
            <div class="cbubble">${m.content}</div>
          </div>
        </div>`;
    }).join('');

    chatEl.scrollTop = chatEl.scrollHeight;
  } catch(e) {
    document.getElementById('chatModalMessages')
      .innerHTML =
        '<div style="text-align:center;color:#dc2626;' +
        'font-size:12px;padding:20px">' +
        'Kunde inte ladda meddelanden</div>';
  }
}

async function sendChatModal() {
  const input =
    document.getElementById('chatModalInput');
  const text = input.value.trim();
  if (!text || !currentChatKey) return;

  const chatEl =
    document.getElementById('chatModalMessages');

  // Remove empty state
  const empty = chatEl.querySelector(
    'div[style*="text-align:center"]');
  if (empty) empty.remove();

  const myMsg = document.createElement('div');
  myMsg.className = 'cmsg mine';
  myMsg.innerHTML = `
    <div class="cav">${driver.name?.charAt(0)||'F'}</div>
    <div style="max-width:72%">
      <div style="font-size:10px;color:#94a3b8;
           margin-bottom:2px;text-align:right">
        ${driver.name?.split(' ')[0]}
      </div>
      <div class="cbubble">${text}</div>
    </div>`;
  chatEl.appendChild(myMsg);
  chatEl.scrollTop = chatEl.scrollHeight;
  input.value = '';

  try {
    await fetch(API + '/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        thread_key: currentChatKey,
        sender_name: driver.name,
        sender_role: 'driver',
        content: text
      })
    });
  } catch(e) {}
}

// ── LOGOUT ──
function logout() {
  if (gpsInterval) clearInterval(gpsInterval);
  if (socket) socket.disconnect();
  localStorage.removeItem('waygo_driver');
  localStorage.removeItem('waygo_driver_token');
  driver = null; token = null;
  isOnline = false; activeBooking = null;
  showScreen('sLogin');
}
</script>
