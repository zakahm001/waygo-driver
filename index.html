<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Waygo — Förarapp</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:Arial,sans-serif;background:#0d1b3e;color:white;min-height:100vh}
    .screen{display:none;min-height:100vh;flex-direction:column}
    .screen.active{display:flex}

    /* LOADING */
    #sLoad{background:#0d1b3e;align-items:center;justify-content:center;gap:12px}
    .load-logo{font-size:64px;color:#fbbf24;animation:bounce 1s infinite}
    .load-name{color:#fbbf24;font-size:26px;font-weight:bold;letter-spacing:4px}
    .load-sub{color:#4a6090;font-size:13px}
    .dots{display:flex;gap:8px;margin-top:12px}
    .dot{width:10px;height:10px;background:#fbbf24;border-radius:50%;animation:dp 1.2s infinite}
    .dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
    @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
    @keyframes dp{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}

    /* LOGIN */
    #sLogin{background:#0d1b3e;padding:30px 24px;align-items:center;justify-content:center}
    .login-wrap{width:100%;max-width:400px}
    .login-logo{text-align:center;margin-bottom:32px}
    .login-icon{font-size:52px;color:#fbbf24}
    .login-name{font-size:26px;font-weight:bold;color:#fbbf24;letter-spacing:3px;margin-top:6px}
    .login-sub{color:#4a6090;font-size:13px;margin-top:4px}
    .login-box{background:#1a2f5e;border-radius:16px;padding:24px;border:1px solid #2a4080}
    .flabel{font-size:11px;font-weight:700;color:#4a6090;text-transform:uppercase;
      letter-spacing:1px;margin-bottom:5px;display:block}
    .finput{width:100%;padding:12px 14px;border-radius:10px;border:1px solid #2a4080;
      background:#0d1b3e;color:white;font-size:15px;outline:none;
      box-sizing:border-box;margin-bottom:14px;transition:border-color .2s}
    .finput:focus{border-color:#fbbf24}
    .finput::placeholder{color:#2a4080}
    .err-box{background:#fee2e2;color:#dc2626;border-radius:8px;padding:10px 14px;
      font-size:13px;margin-bottom:14px;display:none;font-weight:600}

    /* TOPBAR */
    .topbar{background:#0d1b3e;padding:14px 20px;display:flex;align-items:center;
      justify-content:space-between;border-bottom:1px solid #1a2f5e;
      position:sticky;top:0;z-index:100}
    .tlogo{color:#fbbf24;font-size:18px;font-weight:bold}
    .tright{display:flex;align-items:center;gap:10px}

    /* ONLINE TOGGLE */
    .online-toggle{display:flex;align-items:center;gap:8px}
    .toggle-track{width:52px;height:28px;border-radius:14px;
      background:#2a4080;cursor:pointer;position:relative;transition:background .3s}
    .toggle-track.on{background:#15803d}
    .toggle-thumb{position:absolute;width:22px;height:22px;border-radius:50%;
      background:white;top:3px;left:3px;transition:left .3s;
      box-shadow:0 2px 4px rgba(0,0,0,.3)}
    .toggle-track.on .toggle-thumb{left:27px}
    .toggle-label{font-size:12px;font-weight:700;color:#4a6090}
    .toggle-track.on + .toggle-label{color:#22c55e}

    /* STATUS BADGE */
    .status-pill{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700}
    .pill-online{background:#dcfce7;color:#15803d}
    .pill-offline{background:#1a2f5e;color:#4a6090}
    .pill-busy{background:#dbeafe;color:#1a56db}

    /* BOTTOM NAV */
    .bnav{position:fixed;bottom:0;left:0;right:0;background:#0d1b3e;
      display:flex;justify-content:space-around;padding:10px 0;
      border-top:1px solid #1a2f5e;z-index:100}
    .bni{display:flex;flex-direction:column;align-items:center;gap:3px;
      color:#4a6090;font-size:10px;cursor:pointer;border:none;background:none}
    .bni.active{color:#fbbf24}
    .bni-icon{font-size:20px}
    .bspace{height:80px}

    .page{padding:20px;flex:1;overflow-y:auto;background:#eef1f8;color:#0d1b3e}

    /* CARDS */
    .card{background:white;border-radius:14px;padding:18px;margin-bottom:14px;
      border:1px solid #d0d7ea;box-shadow:0 1px 4px rgba(0,0,0,.06)}
    .card-dark{background:#1a2f5e;border-radius:14px;padding:18px;
      margin-bottom:14px;border:1px solid #2a4080}

    .stitle{font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;
      letter-spacing:1.5px;margin-bottom:10px}

    /* BUTTONS */
    .btn{padding:14px;border-radius:10px;font-size:15px;font-weight:700;
      border:none;cursor:pointer;width:100%;text-align:center;transition:all .2s}
    .btn:disabled{opacity:.6;cursor:default}
    .btn-primary{background:#0d1b3e;color:#fbbf24}
    .btn-success{background:#15803d;color:white}
    .btn-danger{background:#dc2626;color:white}
    .btn-gray{background:#f1f5f9;color:#64748b}
    .btn-blue{background:#1a56db;color:white}
    .btn-sm{padding:8px 16px;font-size:13px;width:auto;border-radius:8px}
    .btn-yellow{background:#fbbf24;color:#0d1b3e}

    /* BADGES */
    .badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
    .b-green{background:#dcfce7;color:#15803d;border:1px solid #86efac}
    .b-yellow{background:#fef3c7;color:#d97706;border:1px solid #fde68a}
    .b-red{background:#fee2e2;color:#dc2626;border:1px solid #fecaca}
    .b-blue{background:#dbeafe;color:#1a56db;border:1px solid #93c5fd}
    .b-gray{background:#f1f5f9;color:#64748b;border:1px solid #e2e8f0}
    .b-purple{background:#ede9fe;color:#7c3aed;border:1px solid #ddd6fe}

    /* INCOMING BOOKING OVERLAY */
    .booking-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);
      z-index:500;display:none;align-items:center;justify-content:center;padding:20px}
    .booking-overlay.show{display:flex;animation:slideUp .3s ease}
    @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
    .booking-popup{background:white;border-radius:20px;padding:24px;
      width:100%;max-width:420px;color:#0d1b3e}
    .popup-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
    .popup-new{background:#dc2626;color:white;padding:4px 12px;border-radius:20px;
      font-size:12px;font-weight:700;animation:blink 1s infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.5}}
    .popup-timer{font-size:28px;font-weight:800;color:#dc2626;font-family:monospace}
    .popup-route{font-size:16px;font-weight:700;color:#0d1b3e;margin-bottom:6px}
    .popup-detail{font-size:13px;color:#64748b;margin-bottom:14px}
    .popup-fare{font-size:28px;font-weight:800;color:#0d1b3e;margin-bottom:16px}
    .popup-btns{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .popup-accept{background:#15803d;color:white;border:none;border-radius:12px;
      padding:16px;font-size:16px;font-weight:800;cursor:pointer;
      animation:pulse-green 1s infinite}
    @keyframes pulse-green{0%,100%{box-shadow:0 0 0 0 rgba(21,128,61,.4)}
      50%{box-shadow:0 0 0 12px rgba(21,128,61,0)}}
    .popup-decline{background:#f1f5f9;color:#64748b;border:none;border-radius:12px;
      padding:16px;font-size:16px;font-weight:700;cursor:pointer}

    /* MAP */
    .driver-map{background:#d4e8d4;border-radius:12px;height:180px;position:relative;
      overflow:hidden;margin-bottom:14px;border:1px solid #b8d4b8}
    .map-bg{position:absolute;inset:0;
      background-image:linear-gradient(#b8d4b8 1px,transparent 1px),
      linear-gradient(90deg,#b8d4b8 1px,transparent 1px);
      background-size:25px 25px;opacity:.5}
    .map-road-h{position:absolute;height:5px;background:white;left:0;right:0;opacity:.8}
    .map-road-v{position:absolute;width:5px;background:white;top:0;bottom:0;opacity:.8}
    .my-marker{position:absolute;width:40px;height:40px;border-radius:50%;
      background:#0d1b3e;border:4px solid #fbbf24;display:flex;align-items:center;
      justify-content:center;font-size:18px;transform:translate(-50%,-50%);
      transition:left 1s ease,top 1s ease;box-shadow:0 4px 12px rgba(0,0,0,.4)}
    .customer-marker{position:absolute;width:28px;height:28px;border-radius:50%;
      background:#1a56db;border:3px solid white;display:flex;align-items:center;
      justify-content:center;font-size:12px;transform:translate(-50%,-50%)}
    .map-gps-info{position:absolute;bottom:8px;left:8px;background:rgba(13,27,62,.9);
      color:#fbbf24;border-radius:8px;padding:4px 10px;font-size:11px;font-weight:bold}
    .map-speed{position:absolute;top:8px;right:8px;background:rgba(13,27,62,.9);
      color:#22c55e;border-radius:8px;padding:4px 10px;font-size:11px;font-weight:bold}

    /* EARNINGS CARD */
    .earn-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px}
    .earn-card{background:white;border-radius:12px;padding:12px 8px;text-align:center;
      border:1px solid #d0d7ea}
    .earn-val{font-size:20px;font-weight:800;color:#0d1b3e}
    .earn-lbl{font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:1px;margin-top:2px}

    /* TRIP CARD */
    .trip-card{background:white;border-radius:12px;padding:16px;margin-bottom:10px;
      border:1px solid #d0d7ea}
    .trip-active{border-color:#15803d;box-shadow:0 0 0 3px #dcfce7}
    .trip-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
    .trip-ref{font-size:13px;font-weight:700;color:#1a56db}
    .trip-route{font-size:14px;font-weight:600;color:#0d1b3e;margin-bottom:4px}
    .trip-detail{font-size:12px;color:#64748b;margin-bottom:10px}
    .trip-actions{display:flex;gap:8px;flex-wrap:wrap}

    /* CHAT */
    .chatbox{height:200px;overflow-y:auto;padding:8px 0;
      display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
    .cmsg{display:flex;gap:8px;align-items:flex-end}
    .cmsg.mine{flex-direction:row-reverse}
    .cav{width:28px;height:28px;border-radius:50%;background:#0d1b3e;color:#fbbf24;
      display:flex;align-items:center;justify-content:center;font-size:11px;
      font-weight:bold;flex-shrink:0}
    .cav.central{background:#7c3aed}
    .cav.customer{background:#1a56db}
    .cbubble{max-width:72%;padding:8px 12px;border-radius:12px;font-size:13px;line-height:1.4}
    .cmsg.mine .cbubble{background:#0d1b3e;color:#fbbf24;border-radius:12px 12px 4px 12px}
    .cmsg.other .cbubble{background:#f1f5f9;color:#0d1b3e;border-radius:12px 12px 12px 4px}
    .cinput-row{display:flex;gap:8px}
    .cinput{flex:1;padding:9px 12px;border-radius:24px;border:1px solid #d0d7ea;
      background:#f8fafc;font-size:13px;color:#0d1b3e;outline:none}
    .csend{width:38px;height:38px;border-radius:50%;background:#0d1b3e;border:none;
      color:#fbbf24;font-size:15px;cursor:pointer;flex-shrink:0}

    /* MODAL */
    .moverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);
      z-index:200;align-items:flex-end;justify-content:center}
    .moverlay.open{display:flex}
    .mbox{background:white;border-radius:20px 20px 0 0;padding:24px 20px;
      width:100%;max-width:500px;max-height:88vh;overflow-y:auto;color:#0d1b3e}
    .mtitle{font-size:17px;font-weight:bold;color:#0d1b3e;margin-bottom:16px}
    .minfo{background:#f0f3f9;border-radius:10px;padding:12px 14px;
      font-size:13px;color:#64748b;margin-bottom:14px;line-height:1.8}
    .minfo strong{color:#0d1b3e}

    /* TOAST */
    .toast{position:fixed;bottom:90px;left:20px;right:20px;background:#fbbf24;
      color:#0d1b3e;padding:14px 20px;border-radius:12px;font-size:14px;
      font-weight:bold;text-align:center;z-index:300;display:none;
      box-shadow:0 4px 20px rgba(0,0,0,.3)}
    .toast.show{display:block}

    /* INFO BOXES */
    .infobox{border-radius:8px;padding:10px 12px;font-size:12px;margin-bottom:10px}
    .ib-green{background:#dcfce7;border:1px solid #86efac;color:#15803d}
    .ib-yellow{background:#fef3c7;border:1px solid #fde68a;color:#d97706}
    .ib-blue{background:#dbeafe;border:1px solid #93c5fd;color:#1a56db}
    .ib-red{background:#fee2e2;border:1px solid #fecaca;color:#dc2626}

    /* PROFILE */
    .driver-header{background:linear-gradient(135deg,#0d1b3e,#1a3066);
      padding:24px 20px;display:flex;align-items:center;gap:16px}
    .driver-avatar{width:60px;height:60px;border-radius:50%;background:#fbbf24;
      color:#0d1b3e;display:flex;align-items:center;justify-content:center;
      font-size:24px;font-weight:bold;flex-shrink:0}
    .list-item{display:flex;justify-content:space-between;align-items:center;
      padding:12px 0;border-bottom:1px solid #f8fafc}
    .list-item:last-child{border-bottom:none}

    /* NOTIFICATION PERMISSION BANNER */
    .notif-banner{background:#fbbf24;color:#0d1b3e;padding:12px 16px;
      display:flex;align-items:center;justify-content:space-between;gap:10px}
    .notif-banner-text{font-size:13px;font-weight:700;flex:1}
    .notif-banner-btn{background:#0d1b3e;color:#fbbf24;border:none;border-radius:8px;
      padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
  </style>
</head>
<body>

<!-- LOADING -->
<div class="screen active" id="sLoad">
  <div class="load-logo">▲</div>
  <div class="load-name">WAYGO</div>
  <div class="load-sub">Förarapp · Driver App</div>
  <div class="dots">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>
</div>

<!-- LOGIN -->
<div class="screen" id="sLogin">
  <div class="login-wrap">
    <div class="login-logo">
      <div class="login-icon">▲</div>
      <div class="login-name">WAYGO</div>
      <div class="login-sub">Förarapp — Driver Portal</div>
    </div>
    <div class="login-box">
      <label class="flabel">E-postadress / Email</label>
      <input class="finput" id="loginEmail" type="email" placeholder="din@email.se"
             onkeydown="if(event.key==='Enter')doLogin()"/>
      <label class="flabel">Lösenord / Password</label>
      <input class="finput" id="loginPassword" type="password" placeholder="••••••••"
             onkeydown="if(event.key==='Enter')doLogin()"/>
      <div class="err-box" id="loginErr"></div>
      <button class="btn btn-yellow" id="loginBtn" onclick="doLogin()">
        Logga in som förare →
      </button>
    </div>
    <div style="text-align:center;margin-top:16px;font-size:12px;color:#4a6090">
      Waygo Sverige · Förarportal v1.0
    </div>
  </div>
</div>

<!-- MAIN DRIVER APP -->
<div class="screen" id="sApp">

  <!-- NOTIFICATION PERMISSION BANNER -->
  <div id="notifBanner" class="notif-banner" style="display:none">
    <div class="notif-banner-text">🔔 Aktivera notiser för att inte missa bokningar!</div>
    <button class="notif-banner-btn" onclick="requestNotifPermission()">Aktivera</button>
  </div>

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="tlogo">▲ WAYGO</div>
    <div class="tright">
      <div class="online-toggle" onclick="toggleOnline()">
        <div class="toggle-track" id="toggleTrack">
          <div class="toggle-thumb"></div>
        </div>
        <span class="toggle-label" id="toggleLabel">Offline</span>
      </div>
    </div>
  </div>

  <div style="flex:1;overflow-y:auto;background:#eef1f8" id="tabContent"></div>

  <!-- BOTTOM NAV -->
  <div class="bnav">
    <button class="bni active" id="bni0" onclick="showTab(0)">
      <span class="bni-icon">🏠</span><span>Hem</span>
    </button>
    <button class="bni" id="bni1" onclick="showTab(1)">
      <span class="bni-icon">📋</span><span>Resor</span>
    </button>
    <button class="bni" id="bni2" onclick="showTab(2)">
      <span class="bni-icon">💬</span><span>Chatt</span>
    </button>
    <button class="bni" id="bni3" onclick="showTab(3)">
      <span class="bni-icon">👤</span><span>Profil</span>
    </button>
  </div>
</div>

<!-- INCOMING BOOKING OVERLAY -->
<div class="booking-overlay" id="bookingOverlay">
  <div class="booking-popup">
    <div class="popup-header">
      <div>
        <div class="popup-new">🚨 NY BOKNING!</div>
        <div style="font-size:12px;color:#64748b;margin-top:4px" id="popupRef"></div>
      </div>
      <div class="popup-timer" id="popupTimer">30</div>
    </div>
    <div id="popupPreBadge" style="margin-bottom:8px;display:none">
      <span class="badge b-purple">📅 Förbokning</span>
      <span style="font-size:12px;color:#7c3aed;margin-left:6px" id="popupPreTime"></span>
    </div>
    <div class="popup-route" id="popupRoute"></div>
    <div class="popup-detail" id="popupDetail"></div>
    <div class="popup-fare" id="popupFare"></div>
    <div class="infobox ib-blue" id="popupPayment"></div>
    <div class="popup-btns">
      <button class="popup-decline" onclick="declineBooking()">✕ Neka</button>
      <button class="popup-accept" onclick="acceptBooking()">✓ Acceptera</button>
    </div>
  </div>
</div>

<!-- CHAT MODAL -->
<div class="moverlay" id="chatModal" onclick="closeMIfOut(event,'chatModal')">
  <div class="mbox">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div class="mtitle" id="chatModalTitle" style="margin-bottom:0">Chatt</div>
      <button onclick="closeMod('chatModal')"
        style="background:none;border:none;font-size:22px;cursor:pointer;color:#64748b">✕</button>
    </div>
    <div class="chatbox" id="chatModalMessages"></div>
    <div class="cinput-row">
      <input class="cinput" id="chatModalInput" placeholder="Skriv meddelande..."
             onkeydown="if(event.key==='Enter')sendChatModal()"/>
      <button class="csend" onclick="sendChatModal()">➤</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- AUDIO for booking alert -->
<audio id="alertSound" preload="auto">

<script>
const API = 'https://16.16.153.106.sslip.io';

// ── STATE ──
let driver = null;
let token = null;
let isOnline = false;
let activeBooking = null;
let myTrips = [];
let currentTab = 0;
let socket = null;
let gpsInterval = null;
let currentLat = 59.3293;
let currentLng = 18.0686;
let popupTimerInterval = null;
let pendingBooking = null;
let chatThreadKey = null;
let chatRole = 'driver';

// Demo driver accounts (in real app these come from database)
const DEMO_DRIVERS = [
  { id:1, name:'Erik Lindström',  email:'erik@waygo.se',  password:'driver123',
    plate:'ABC 123', taxiNr:'TL-4421', city:'Stockholm', rating:4.9, trips_today:0, earnings_today:0 },
  { id:2, name:'Amina Warsame',   email:'amina@waygo.se', password:'driver123',
    plate:'DEF 456', taxiNr:'TL-2209', city:'Göteborg',  rating:4.8, trips_today:0, earnings_today:0 },
  { id:3, name:'Lars Petersson',  email:'lars@waygo.se',  password:'driver123',
    plate:'GHI 789', taxiNr:'TL-8834', city:'Malmö',     rating:4.7, trips_today:0, earnings_today:0 },
];

// ── INIT ──
window.addEventListener('load', () => {
  setTimeout(() => {
    const saved = localStorage.getItem('waygo_driver');
    const savedToken = localStorage.getItem('waygo_driver_token');
    if (saved && savedToken) {
      driver = JSON.parse(saved);
      token = savedToken;
      enterApp();
    } else {
      showScreen('sLogin');
    }
  }, 2000);

async function doLogin() {

  const password = document.getElementById('loginPassword').value.trim();
  const errEl = document.getElementById('loginErr');
  const btn = document.getElementById('loginBtn');
  errEl.style.display = 'none';

  if (!email || !password) {
    errEl.textContent = '⚠️ Fyll i e-post och lösenord';
    errEl.style.display = ''; return;
  }

  btn.textContent = 'Loggar in...'; btn.disabled = true;

  // Check demo accounts first
  const demoMatch = DEMO_DRIVERS.find(d =>
    d.email === email && d.password === password);

  if (demoMatch) {

    token = 'driver-token-' + demoMatch.id;
    localStorage.setItem('waygo_driver', JSON.stringify(driver));
    localStorage.setItem('waygo_driver_token', token);
    enterApp();

  }

  errEl.textContent = '⚠️ Fel e-post eller lösenord';
  errEl.style.display = '';
  btn.textContent = 'Logga in som förare →'; btn.disabled = false;
}

// ── NOTIFICATION PERMISSION ──
function checkNotifPermission() {
  if ('Notification' in window && Notification.permission === 'default') {

  }
}

function requestNotifPermission() {
  if ('Notification' in window) {

      if (perm === 'granted') {
        showToast('✅ Notiser aktiverade!');
      }
    });

}

function sendPushNotification(title, body) {
  if ('Notification' in window && Notification.permission === 'granted') {
    new Notification(title, {
      body: body,
      icon: 'https://zakahm001.github.io/waygo-driver/icon.png',
      badge: 'https://zakahm001.github.io/waygo-driver/icon.png',
      tag: 'waygo-booking',
      requireInteraction: true, // stays until dismissed
    });
  }
}

function playAlertSound() {
  try {
    // Create audio context for reliable sound
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const playBeep = (freq, start, duration) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = freq;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.8, ctx.currentTime + start);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + start + duration);
      osc.start(ctx.currentTime + start);
      osc.stop(ctx.currentTime + start + duration);
    };
    // Three ascending beeps
    playBeep(440, 0, 0.3);
    playBeep(550, 0.35, 0.3);
    playBeep(660, 0.7, 0.5);
    playBeep(440, 1.3, 0.3);
    playBeep(550, 1.65, 0.3);
    playBeep(660, 2.0, 0.5);
  } catch(e) {
    console.log('Sound unavailable:', e.message);
  }
}

function vibrate() {
  if ('vibrate' in navigator) {
    // Long-short-long pattern
    navigator.vibrate([800, 200, 400, 200, 800, 200, 400, 200, 800]);
  }
}

// ── FULL ALERT when booking arrives ──
function triggerBookingAlert(booking) {
  // 1. Sound
  playAlertSound();

  // 2. Vibration
  vibrate();

  // 3. Push notification
  sendPushNotification(
    '🚨 Ny bokning! ' + booking.booking_ref,
    '📍 ' + booking.from_address + ' → ' + booking.to_address +
    ' · ' + booking.fare_sek + ' kr'
  );

  // 4. Show overlay
  showBookingPopup(booking);
}

// ── GPS TRACKING ──
function startGPS() {
  if ('geolocation' in navigator) {
    navigator.geolocation.watchPosition(
      pos => {
        currentLat = pos.coords.latitude;
        currentLng = pos.coords.longitude;
        if (isOnline && socket) {
          socket.emit('driver:location', {
            driverId: driver.id,
            lat: currentLat,
            lng: currentLng
          });
        }
      },
      err => {
        // Simulate GPS movement if not available
        console.log('GPS:', err.message);
      },
      { enableHighAccuracy: true, maximumAge: 5000, timeout: 10000 }
    );
  }

  // Send simulated GPS every 5 seconds as fallback
  gpsInterval = setInterval(() => {
    if (isOnline && socket) {
      currentLat += (Math.random() - 0.5) * 0.001;
      currentLng += (Math.random() - 0.5) * 0.001;
      socket.emit('driver:location', {
        driverId: driver.id,
        lat: currentLat,
        lng: currentLng
      });
      updateMapMarker();
    }
  }, 5000);
}

function updateMapMarker() {
  const marker = document.getElementById('myMarker');
  if (!marker) return;
  const minLat=59.2, maxLat=59.5, minLng=17.8, maxLng=18.2;
  const x = ((currentLng - minLng) / (maxLng - minLng)) * 80 + 10;
  const y = ((maxLat - currentLat) / (maxLat - minLat)) * 80 + 10;
  marker.style.left = Math.min(90,Math.max(10,x)) + '%';
  marker.style.top = Math.min(90,Math.max(10,y)) + '%';
}

// ── SOCKET.IO ──
function connectSocket() {
  try {
    socket = io(API);

    socket.on('connect', () => {
      console.log('Driver socket connected');
      socket.emit('driver:join', driver.id);
    });

    // New booking arrives
    socket.on('booking:new', (booking) => {
      if (!isOnline) return;
      if (activeBooking) return; // already on a trip
      triggerBookingAlert(booking);
    });

    // Central sends message to driver
    socket.on('message:new:central-driver-' + driver.id, (msg) => {
      showToast('💬 Central: ' + msg.content, '#7c3aed');
      if (currentTab === 2) showTab(2);
    });

    // Booking cancelled by central
    socket.on('booking:cancelled', (data) => {
      if (activeBooking && activeBooking.id === data.id) {
        activeBooking = null;
        showToast('⚠️ Bokning avbokad av central', '#dc2626');
        showTab(0);
      }
    });

    socket.on('disconnect', () => {
      console.log('Driver socket disconnected');
    });

  } catch(e) {
    console.log('Socket error:', e);
  }
}

// ── BOOKING POPUP ──
function showBookingPopup(booking) {
  pendingBooking = booking;
  let countdown = 30;

  document.getElementById('popupRef').textContent = booking.booking_ref;
  document.getElementById('popupRoute').textContent =
    '📍 ' + booking.from_address + ' → 🏁 ' + booking.to_address;
  document.getElementById('popupDetail').textContent =
    'Kund: ' + booking.customer_name + ' · ' + booking.customer_phone;
  document.getElementById('popupFare').textContent = booking.fare_sek + ' kr';

  const payLabels = { swish:'📱 Swish', card:'💳 Kort', invoice:'📄 Faktura' };
  document.getElementById('popupPayment').textContent =
    'Betalning: ' + (payLabels[booking.payment_method] || booking.payment_method);

  // Pre-booking badge
  const preBadge = document.getElementById('popupPreBadge');
  if (booking.booking_type === 'pre' && booking.scheduled_at) {
    preBadge.style.display = '';
    document.getElementById('popupPreTime').textContent =
      new Date(booking.scheduled_at).toLocaleString('sv-SE',
        { dateStyle:'medium', timeStyle:'short' });
  } else {
    preBadge.style.display = 'none';
  }

  document.getElementById('popupTimer').textContent = countdown;
  document.getElementById('bookingOverlay').classList.add('show');

  // Countdown timer
  if (popupTimerInterval) clearInterval(popupTimerInterval);
  popupTimerInterval = setInterval(() => {
    countdown--;
    document.getElementById('popupTimer').textContent = countdown;
    if (countdown <= 0) {
      clearInterval(popupTimerInterval);
      declineBooking();
    }
  }, 1000);
}

async function acceptBooking() {
  if (!pendingBooking) return;
  clearInterval(popupTimerInterval);
  document.getElementById('bookingOverlay').classList.remove('show');

  try {
    const res = await fetch(API + '/bookings/' + pendingBooking.id + '/assign', {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ driver_id: driver.id })
    });
    if (res.ok) {
      activeBooking = pendingBooking;
      pendingBooking = null;
      driver.trips_today = (driver.trips_today || 0) + 1;
      localStorage.setItem('waygo_driver', JSON.stringify(driver));
      showToast('✅ Bokning accepterad! Navigera till kunden.');
      showTab(1);
    }
  } catch(err) {
    showToast('⚠️ Kunde inte acceptera bokning', '#dc2626');
  }
}

function declineBooking() {
  clearInterval(popupTimerInterval);
  document.getElementById('bookingOverlay').classList.remove('show');
  pendingBooking = null;
  showToast('Bokning nekad');
}

// ── COMPLETE TRIP ──
async function completeTrip() {
  if (!activeBooking) return;
  try {
    const res = await fetch(API + '/bookings/' + activeBooking.id + '/cancel', {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: 'completed' })
    });
    driver.earnings_today = (driver.earnings_today || 0) + (activeBooking.fare_sek || 0);
    myTrips.unshift({ ...activeBooking, status: 'completed', completed_at: new Date() });
    localStorage.setItem('waygo_driver', JSON.stringify(driver));
    activeBooking = null;
    showToast('✅ Resa slutförd! Bra jobbat!');
    if (socket) socket.emit('driver:status', { driverId: driver.id, status: 'available' });
    showTab(0);
  } catch(err) {
    showToast('⚠️ Fel vid slutförande', '#dc2626');
  }
}

          <span style="font-size:13px;font-weight:700;color:#15803d">${driver.trips_today || 0}</span>
        </div>
        <div class="list-item" style="border:none">
          <span style="font-size:14px;color:#0d1b3e">Intäkter idag</span>
          <span style="font-size:13px;font-weight:700;color:#15803d">${driver.earnings_today || 0} kr</span>
        </div>
      </div>

      <div class="card">
        <div class="stitle">Notifieringar</div>
        <div class="list-item">
          <span style="font-size:14px;color:#0d1b3e">Bokningsljud</span>
          <span class="badge b-green">✅ Aktivt</span>
        </div>
        <div class="list-item">
          <span style="font-size:14px;color:#0d1b3e">Vibration</span>
          <span class="badge b-green">✅ Aktivt</span>
        </div>
        <div class="list-item" style="border:none">
          <span style="font-size:14px;color:#0d1b3e">Push-notiser</span>
          <span class="badge ${('Notification' in window && Notification.permission === 'granted') ? 'b-green' : 'b-yellow'}">
            ${('Notification' in window && Notification.permission === 'granted') ? '✅ Aktivt' : '⚠️ Ej aktiverat'}
          </span>
        </div>
      </div>

      <button class="btn btn-danger" onclick="logout()">Logga ut</button>

      <div class="bspace"></div>
    </div>`;
}

// ── CHAT ──
let currentChatKey = null;
let currentChatPerson = null;

function openChat(threadKey, otherRole, personName) {
  currentChatKey = threadKey;
  currentChatPerson = personName;

  document.getElementById('chatModalTitle').textContent = '💬 ' + personName;
  document.getElementById('chatModalMessages').innerHTML =
    '<div style="text-align:center;color:#94a3b8;font-size:12px;padding:20px">Laddar meddelanden...</div>';

  document.getElementById('chatModal').classList.add('open');
  loadChatMessages(threadKey);
}

async function loadChatMessages(threadKey) {
  try {
    const res = await fetch(API + '/messages/' + threadKey);
    const data = await res.json();
    const msgs = data.messages || [];
    const chatEl = document.getElementById('chatModalMessages');

    if (msgs.length === 0) {
      chatEl.innerHTML = '<div style="text-align:center;color:#94a3b8;font-size:12px;padding:20px">Inga meddelanden ännu</div>';
      return;
    }

    chatEl.innerHTML = msgs.map(m => {
      const mine = m.sender_role === 'driver';
      return `<div class="cmsg ${mine?'mine':'other'}">
        <div class="cav ${mine?'':'central'}">${m.sender_name?.charAt(0)||'?'}</div>
        <div style="max-width:72%">
          <div style="font-size:10px;color:#94a3b8;margin-bottom:2px;text-align:${mine?'right':'left'}">${m.sender_name}</div>
          <div class="cbubble">${m.content}</div>
        </div>
      </div>`;
    }).join('');

    chatEl.scrollTop = chatEl.scrollHeight;
  } catch(e) {
    document.getElementById('chatModalMessages').innerHTML =
      '<div style="text-align:center;color:#dc2626;font-size:12px;padding:20px">Kunde inte ladda meddelanden</div>';
  }
}

async function sendChatModal() {
  const input = document.getElementById('chatModalInput');
  const text = input.value.trim();
  if (!text || !currentChatKey) return;

  const chatEl = document.getElementById('chatModalMessages');

  // Add optimistically
  const myMsg = document.createElement('div');
  myMsg.className = 'cmsg mine';
  myMsg.innerHTML = `
    <div class="cav">${driver.name?.charAt(0)||'F'}</div>
    <div style="max-width:72%">
      <div style="font-size:10px;color:#94a3b8;margin-bottom:2px;text-align:right">${driver.name?.split(' ')[0]}</div>
      <div class="cbubble">${text}</div>
    </div>`;
  chatEl.appendChild(myMsg);
  chatEl.scrollTop = chatEl.scrollHeight;
  input.value = '';

  try {
    await fetch(API + '/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        thread_key: currentChatKey,
        sender_name: driver.name,
        sender_role: 'driver',
        content: text
      })
    });
  } catch(e) {}
}

// ── LOGOUT ──
function logout() {
  if (gpsInterval) clearInterval(gpsInterval);
  if (socket) socket.disconnect();
  localStorage.removeItem('waygo_driver');
  localStorage.removeItem('waygo_driver_token');
  driver = null; token = null;
  isOnline = false; activeBooking = null;
  showScreen('sLogin');
}
</script>
